<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Sites - GhostShield</title>
    <style>
        :root { --bg-primary: #0a0a0f; --bg-secondary: #121218; --bg-card: #16161e; --border-color: #2a2a35; --text-primary: #f0f0f5; --text-secondary: #8888a0; --accent: #8b5cf6; --danger: #ef4444; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); padding: 24px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border-color); margin-bottom: 24px; }
        .sidebar-logo h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #c084fc, #8b5cf6, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-logo span { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: var(--text-secondary); font-size: 0.875rem; cursor: pointer; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: rgba(139, 92, 246, 0.15); color: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; }
        .main-wrapper { flex: 1; margin-left: 260px; }
        .topbar { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .topbar-title { font-size: 1.125rem; font-weight: 600; text-transform: capitalize; color: var(--text-secondary); }
        .btn-logout { padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 0.875rem; }
        .btn-logout:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .content { padding: 32px; }
        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.75rem; font-weight: 700; }
        .page-subtitle { color: var(--text-secondary); font-size: 0.875rem; }
        .sites-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        .sites-table th, .sites-table td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .sites-table th { background: var(--bg-secondary); color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; font-weight: 500; }
        .sites-table tr:hover { background: var(--bg-card); }
        .site-status { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .site-status.online { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .site-status.paused { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .site-status.offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .action-btn { padding: 6px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; margin-right: 8px; }
        .action-btn:hover { background: var(--bg-card); color: var(--text-primary); }
        .empty { text-align: center; padding: 60px; color: var(--text-secondary); }
        @media (max-width: 768px) { .sidebar { display: none; } .main-wrapper { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h1>GhostShield</h1><span>Painel Admin</span></div>
            <nav>
                <a class="nav-item" href="/admin/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a class="nav-item" href="/admin/analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21H3V3"/><path d="M21 9l-6 6-4-4-6 6"/></svg>Análises</a>
                <a class="nav-item active" href="/admin/sites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Meus Sites</a>
                <a class="nav-item" href="/admin/payments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Cartões</a>
                <a class="nav-item" href="/admin/logs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Logs & Monitor</a>
            </nav>
        </aside>
        <div class="main-wrapper">
            <header class="topbar"><h2 class="topbar-title">meus sites</h2><button class="btn-logout" id="logoutBtn">Sair</button></header>
            <main class="content">
                <div class="page-header">
                    <div><h1 class="page-title">Meus Sites</h1><p class="page-subtitle">Gerencie seus sites de vendas</p></div>
                </div>
                <table class="sites-table">
                    <thead><tr><th>Site</th><th>Domínio</th><th>Vendas Hoje</th><th>Faturamento</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="sitesTable">
                        <tr>
                            <td><strong>Loja Principal</strong></td>
                            <td>achadinhosdomomento.shop</td>
                            <td>0</td>
                            <td>R$ 0</td>
                            <td><span class="site-status online">Online</span></td>
                            <td>
                                <button class="action-btn">Ver</button>
                                <button class="action-btn">Análises</button>
                                <button class="action-btn">Pausar</button>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="6" class="empty">Nenhum outro site cadastrado</td>
                        </tr>
                    </tbody>
                </table>
            </main>
        </div>
    </div>
    <script>
        function getCookie(n){const v=`; ${document.cookie}`;const p=v.split(`; ${n}=`);return p.length===2?p.pop().split(';').shift():null}
        document.getElementById('logoutBtn').addEventListener('click',async()=>{await fetch('/api/auth/logout',{method:'POST'});window.location.href='/admin/login'});
    </script>
</body>
</html>
